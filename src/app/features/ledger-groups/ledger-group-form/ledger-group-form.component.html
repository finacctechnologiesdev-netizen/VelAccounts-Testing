<form [formGroup]="form" (ngSubmit)="save()" class="frm-layout" novalidate>

  <!-- Code -->
  <div class="frm-field">
    <label class="frm-label" for="grp-code">
      Group Code <span class="frm-required">*</span>
    </label>
    <div class="frm-input-wrap" [class.frm-input-wrap--error]="f['Grp_Code'].invalid && f['Grp_Code'].touched">
      <i class="pi pi-hashtag frm-prefix-icon"></i>
      <input
        id="grp-code"
        class="frm-input frm-input--has-icon"
        type="text"
        formControlName="Grp_Code"
        placeholder="e.g. ASSETS"
        autocomplete="off"
        maxlength="20" />
    </div>
    @if (f['Grp_Code'].invalid && f['Grp_Code'].touched) {
      <span class="frm-error">
        <i class="pi pi-exclamation-circle"></i>
        Group code is required.
      </span>
    }
  </div>

  <!-- Name -->
  <div class="frm-field">
    <label class="frm-label" for="grp-name">
      Group Name <span class="frm-required">*</span>
    </label>
    <div class="frm-input-wrap" [class.frm-input-wrap--error]="f['Grp_Name'].invalid && f['Grp_Name'].touched">
      <i class="pi pi-tag frm-prefix-icon"></i>
      <input
        id="grp-name"
        class="frm-input frm-input--has-icon"
        type="text"
        formControlName="Grp_Name"
        placeholder="e.g. Current Assets"
        autocomplete="off"
        maxlength="100" />
    </div>
    @if (f['Grp_Name'].invalid && f['Grp_Name'].touched) {
      <span class="frm-error">
        <i class="pi pi-exclamation-circle"></i>
        Group name is required.
      </span>
    }
  </div>

  <!-- Remarks -->
  <div class="frm-field">
    <label class="frm-label" for="grp-remarks">Remarks</label>
    <div class="frm-input-wrap">
      <textarea
        id="grp-remarks"
        class="frm-textarea"
        formControlName="Remarks"
        placeholder="Optional notes about this group…"
        rows="3"
        maxlength="250">
      </textarea>
    </div>
    <span class="frm-hint">{{ f['Remarks'].value.length }} / 250</span>
  </div>

  <!-- Footer Buttons -->
  <div class="frm-footer">
    <button type="button" class="ui-btn ui-btn--cancel" (click)="cancel()" id="btn-va-cancel">
      <i class="pi pi-times"></i>
      Cancel
    </button>
    <button type="submit" class="ui-btn ui-btn--save" [disabled]="saving" id="btn-va-save">
      @if (saving) {
        <i class="pi pi-spin pi-spinner"></i>
        Saving…
      } @else {
        <i class="pi pi-check"></i>
        {{ row() ? 'Update' : 'Create' }}
      }
    </button>
  </div>

</form>
